<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5.3.2 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons 1.11.3 CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <title>TechStore - Chi tiết đơn hàng #9042</title>

    <style>
      :root {
        --color-accent: #6600a1; 
        --color-accent-darker: #9a3cc9; 
        --color-text-main: #1a1a1a;
        --color-text-subtle: #555555;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        color: var(--color-text-main);
        background-color: #f8f9fa;
      }
      
      /* Sidebar styles */
      #admin-sidebar {
        min-height: 100vh;
        background-color: #212529;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        z-index: 1000;
      }
      #admin-sidebar .nav-link {
        color: #adb5bd;
        padding: 0.75rem 1.5rem;
        font-weight: 500;
      }
      #admin-sidebar .nav-link i {
        margin-right: 0.75rem;
        width: 20px;
        text-align: center;
      }
      #admin-sidebar .nav-link:hover {
        color: #ffffff;
        background-color: rgba(255, 255, 255, 0.05);
      }
      #admin-sidebar .nav-link.active {
        color: #ffffff;
        background-color: var(--color-accent);
      }

      .admin-top-nav {
        background-color: #ffffff;
        border-bottom: 1px solid #dee2e6;
      }
      .admin-content {
        padding: 2rem;
      }

      /* Order Detail Styles */
      .card {
        border: none;
        border-radius: 12px;
      }
      .order-label {
        color: var(--color-text-subtle);
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
      }
      .order-value {
        font-weight: 600;
        color: var(--color-text-main);
      }
      .product-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      .bonus-item {
        font-size: 0.8rem;
        color: #666;
        background: #f0f0f0;
        padding: 2px 8px;
        border-radius: 10px;
        display: inline-block;
        margin-top: 4px;
      }
      .total-row {
        font-size: 1.1rem;
        font-weight: bold;
        color: var(--color-accent);
      }
      
      /* Status badges colors */
      .status-pending { background-color: #fff3cd; color: #856404; }
      .status-shipping { background-color: #cce5ff; color: #004085; }
      .status-completed { background-color: #d4edda; color: #155724; }
      .status-cancelled { background-color: #f8d7da; color: #721c24; }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <nav id="admin-sidebar" class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div class="position-sticky pt-3">
          <a href="index.html" class="d-block px-3 mb-3 text-white text-decoration-none">
            <img src="../public/img/TFT_pic_reverse.png" alt="Logo" style="height: 32px;" onerror="this.src='https://placehold.co/120x32?text=TechStore'">
          </a>

          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="admin.html"><i class="bi bi-speedometer2"></i> Tổng quan</a></li>
            <li class="nav-item"><a class="nav-link active" href="admin_orders.html"><i class="bi bi-receipt"></i> Quản lý Đơn hàng</a></li>
            <li class="nav-item"><a class="nav-link" href="admin_products.html"><i class="bi bi-box-seam"></i> Quản lý Sản phẩm</a></li>
            <li class="nav-item"><a class="nav-link" href="admin_category.html"><i class="bi bi-tags"></i> Quản lý Danh mục</a></li>
            <li class="nav-item"><a class="nav-link" href="admin_account.html"><i class="bi bi-people"></i> Quản lý tài khoản</a></li>
          </ul>
        </div>
      </nav>

      <!-- MAIN CONTENT -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-0">
        <!-- Header -->
        <nav class="navbar navbar-expand-lg admin-top-nav shadow-sm sticky-top px-3">
          <div class="container-fluid">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="admin_orders.html" class="text-decoration-none" style="color: var(--color-accent)">Đơn hàng</a></li>
                <li class="breadcrumb-item active" aria-current="page">Chi tiết #9042</li>
              </ol>
            </nav>
            <div class="ms-auto d-flex gap-2">
                <button class="btn btn-outline-dark btn-sm" onclick="window.print()">
                    <i class="bi bi-printer me-1"></i> In hóa đơn
                </button>
                <a href="admin_orders.html" class="btn btn-secondary btn-sm">Quay lại</a>
            </div>
          </div>
        </nav>

        <div id="main" class="admin-content">
          <!-- Order Summary Header -->
          
        </div>
      </main>
    </div>

    <!-- Bootstrap 5.3.2 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="dist/admin.js"></script>
  </body>
</html>
