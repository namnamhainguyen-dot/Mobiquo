    <style>
      :root {
  --color-accent: #00a169; 
  --color-accent-darker: #007d52; 
  --sidebar-width: 240px;
  --sidebar-bg: #212529;
}

/* ĐỒNG BỘ TỶ LỆ CHỮ 14px */
html { font-size: 14px; }

body {
  font-family: "Segoe UI", sans-serif;
  background-color: #f8f9fa;
  color: #333;
  margin: 0;
}

/* SIDEBAR CỐ ĐỊNH (FIXED) */
#admin-sidebar {
  width: var(--sidebar-width);
  height: 100vh;
  background-color: var(--sidebar-bg);
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1030;
  overflow-y: auto;
}

#admin-sidebar .nav-link {
  color: #adb5bd;
  padding: 0.8rem 1.5rem;
  display: flex;
  align-items: center;
  border-left: 4px solid transparent;
  transition: 0.2s;
  text-decoration: none;
}

#admin-sidebar .nav-link.active {
  color: #ffffff;
  background-color: rgba(0, 161, 105, 0.15);
  border-left-color: var(--color-accent);
}

#admin-sidebar .nav-link i { margin-right: 0.75rem; width: 20px; text-align: center; }
#admin-sidebar .nav-link:hover { color: #fff; background-color: rgba(255, 255, 255, 0.05); }

/* MAIN CONTENT ADJUSTMENT */
main {
  margin-left: var(--sidebar-width) !important;
  width: calc(100% - var(--sidebar-width)) !important;
  min-height: 100vh;
}

.admin-top-nav {
  background: #fff;
  border-bottom: 1px solid #dee2e6;
  padding: 0.75rem 1.5rem;
}

.admin-content { padding: 1.5rem 2rem; }

/* CARD & FORM STYLES */
.card { 
  border: none; 
  border-radius: 10px; 
  box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); 
  margin-bottom: 1.5rem; 
}

.form-label {
  font-weight: 600;
  color: #495057;
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
}

.form-control, .form-select {
  border: 1px solid #dee2e6;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
}

.form-control:focus {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 0.2rem rgba(0, 161, 105, 0.15);
}

/* IMAGE PREVIEW CUSTOM */
.preview-container {
  background: #fdfdfd;
  border: 2px dashed #dee2e6;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
}

.preview-container:hover {
  border-color: var(--color-accent);
}

.preview-img {
  max-width: 100%;
  max-height: 250px;
  object-fit: contain;
  border-radius: 8px;
}

/* BUTTONS */
.btn-primary { background-color: var(--color-accent); border-color: var(--color-accent); }
.btn-primary:hover { background-color: var(--color-accent-darker); border-color: var(--color-accent-darker); }

/* RESPONSIVE */
@media (max-width: 991.98px) {
  #admin-sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
  main { margin-left: 0 !important; width: 100% !important; }
}
    </style>
