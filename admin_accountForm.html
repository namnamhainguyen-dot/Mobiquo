<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <title>Biểu mẫu Tài khoản - MobiQuo Admin</title>
    <style>
      :root {
        --color-accent: #6600a1; 
        --color-accent-darker: #4a0075; 
        --color-text-main: #1a1a1a;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f8f9fa;
      }
      #admin-sidebar {
        min-height: 100vh;
        background-color: #212529;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        z-index: 1000;
      }
      #admin-sidebar .nav-link {
        color: #adb5bd;
        padding: 0.75rem 1.5rem;
      }
      #admin-sidebar .nav-link.active {
        color: #ffffff;
        background-color: var(--color-accent);
      }
      .admin-top-nav {
        background-color: #ffffff;
        border-bottom: 1px solid #dee2e6;
      }
      .admin-content { padding: 2rem; }
      .form-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <nav id="admin-sidebar" class="col-lg-2 col-md-3 d-none d-md-block p-0">
        <div class="pt-3">
          <a href="index.html" class="d-block px-3 mb-3 text-white text-decoration-none">
            <h4 class="fw-bold"><i class="bi bi-cpu me-2"></i>MobiQuo</h4>
          </a>
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="admin.html"><i class="bi bi-speedometer2 me-2"></i>Tổng quan</a></li>
            <li class="nav-item"><a class="nav-link" href="admin_orders.html"><i class="bi bi-receipt me-2"></i>Đơn hàng</a></li>
            <li class="nav-item"><a class="nav-link" href="admin_products.html"><i class="bi bi-box-seam me-2"></i>Sản phẩm</a></li>
            <li class="nav-item"><a class="nav-link active" href="admin_account.html"><i class="bi bi-people me-2"></i>Tài khoản</a></li>
          </ul>
        </div>
      </nav>

      <!-- MAIN CONTENT -->
      <main class="col-lg-10 col-md-9 ms-sm-auto px-0">
        <nav class="navbar navbar-expand-lg admin-top-nav shadow-sm sticky-top px-4">
          <span class="navbar-brand fw-bold">Quản lý Tài khoản</span>
          <div class="ms-auto">
            <a href="admin_account.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại danh sách</a>
          </div>
        </nav>

        <div id="main" class="admin-content">
            <!-- Content will be rendered by AdminAccountFormController -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Đang tải biểu mẫu...</p>
            </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="dist/admin.js"></script>
  </body>
</html>
